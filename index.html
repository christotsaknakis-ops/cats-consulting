<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.T.S. Consulting</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #2d3436; 
            color: #ecf0f1;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .main-header {
            text-align: center;
            padding: 40px;
            max-width: 900px;
        }

        /* SVG & Animation Styling */
        .logo-svg {
            filter: drop-shadow(0 0 15px rgba(236, 240, 241, 0.1));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .logo-svg:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .philosophy-container {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(189, 195, 199, 0.2);
            position: relative;
        }

        .philosophy-quote {
            font-size: 1.4rem;
            font-style: italic;
            color: #bdc3c7;
            letter-spacing: 0.5px;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

<header class="main-header">
    <!-- SVG-Logo Nachbau: Gebürstetes Silber auf Sturmgrau -->
    <svg class="logo-svg" width="220" height="220" viewBox="0 0 200 200" xmlns="http://w3.org">
        <defs>
            <!-- Metallic Brushed Silver Gradient -->
            <linearGradient id="silverReflex" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:1" />
                <stop offset="25%" style="stop-color:#ecf0f1;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#bdc3c7;stop-opacity:1" />
                <stop offset="75%" style="stop-color:#ffffff;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
            </linearGradient>
        </defs>
        
        <!-- Leiterbahnen mit Kontaktpunkten -->
        <g stroke="url(#silverReflex)" stroke-width="2.5" fill="none">
            <path d="M100 0 V45 M80 5 V45 M120 5 V45" />
            <path d="M100 155 V200 M80 155 V195 M120 155 V195" />
            <path d="M0 100 H45 M5 80 H45 M5 120 H45" />
            <path d="M155 100 H200 M155 80 H195 M155 120 H195" />
            <!-- Endpunkte (Dots) -->
            <circle cx="100" cy="5" r="2.5" fill="url(#silverReflex)" />
            <circle cx="5" cy="100" r="2.5" fill="url(#silverReflex)" />
            <circle cx="195" cy="100" r="2.5" fill="url(#silverReflex)" />
        </g>
        
        <!-- Haupt-Chip -->
        <rect x="45" y="45" width="110" height="110" rx="14" fill="url(#silverReflex)" />
        
        <!-- Branding im Chip -->
        <text x="100" y="108" text-anchor="middle" font-weight="900" font-size="24" fill="#2d3436" style="letter-spacing: 1px;">C.A.T.S.</text>
    </svg>

    <div class="philosophy-container">
        <p class="philosophy-quote">
            &bdquo;Ein harmloser Mann ist nicht friedlich, er ist harmlos.&ldquo;
        </p>
    </div>
</header>

</body>
</html>
