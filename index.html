<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATS Consulting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #374151;
            color: #C0C0C0;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #2d3540;
            padding: 1rem 2rem;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            color: #C0C0C0;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: #C0C0C0;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* Dropdown Menu */
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #2d3540;
            border-radius: 4px;
            padding: 0.5rem;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            z-index: 100;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #2d3540;
            border-radius: 4px;
            padding: 0.5rem;
            min-width: 200px;
        }

        .dropdown-menu li {
            margin-bottom: 0.5rem;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-image: url('https://images.unsplash.com/photo-1558493627-e6e0d2c8b6f3?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(55, 65, 81, 0.7);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 2rem;
        }

        .slogan {
            font-size: 3rem;
            color: #C0C0C0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Contact Section */
        .contact-section {
            max-width: 800px;
            margin: 4rem auto;
            padding: 3rem;
            background-color: #2d3540;
            border-radius: 8px;
        }

        .contact-section h2 {
            color: #C0C0C0;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #C0C0C0;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: #374151;
            border: 2px solid #C0C0C0;
            color: #C0C0C0;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(192, 192, 192, 0.3);
        }

        .pgp-info {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #2d3540;
            border-left: 4px solid #C0C0C0;
        }

        .submit-btn {
            background-color: #C0C0C0;
            color: #374151;
            padding: 1rem 2rem;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">⚙️ CATS Consulting</div>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li class="dropdown">
                        <span>Expertise ▾</span>
                        <div class="dropdown-menu">
                            <ul>
                                <li><a href="#intelligence">Intelligence</a></li>
                                <li><a href="#audits">Audits</a></li>
                                <li><a href="#response">Response</a></li>
                            </ul>
                        </div>
                    </li>
                    <li><a href="#contact">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="slogan">Ein harmloser Mann ist nicht friedlich, er ist harmlos.</h1>
        </div>
    </section>

    <section class="contact-section" id="contact">
        <h2>Kontakt</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">E-Mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Betreff:</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <button type="submit" class="submit-btn">Absenden</button>
        </form>

        <div class="pgp-info">
            <h3>PGP-Verschlüsselung</h3>
            <p><strong>Fingerprint:</strong> 0x4A7B9C2D1E8F6A5B</p>
            <p><strong>Email:</strong> kontakt@cats-consulting.de</p>
        </div>
    </section>
</body>
</html>
