<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.T.S. Consulting</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            background-color: #2d3436; /* Mattes Sturmgrau */
            color: #ecf0f1; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .main-container { text-align: center; width: 100%; max-width: 600px; }
        
        /* Silber-Effekt Definitionen */
        .silver-stroke { stroke: url(#brushedSilver); stroke-width: 2; fill: none; }
        .silver-fill { fill: url(#brushedSilver); }
        
        .philosophy {
            margin-top: -20px;
            font-size: 1.4rem;
            font-style: italic;
            color: #bdc3c7;
            opacity: 0.9;
            padding: 20px;
            border-top: 1px solid rgba(189, 195, 199, 0.1);
        }
    </style>
</head>
<body>
<div class="main-container">
    <svg viewBox="0 0 500 600" xmlns="http://w3.org">
        <defs>
            <linearGradient id="brushedSilver" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#bdc3c7" />
                <stop offset="50%" style="stop-color:#ffffff" />
                <stop offset="100%" style="stop-color:#bdc3c7" />
            </linearGradient>
            <linearGradient id="reflectionFade" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#bdc3c7; stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#bdc3c7; stop-opacity:0" />
            </linearGradient>
        </defs>

        <!-- Leiterbahnen & Pins (Basierend auf PDF) -->
        <g class="silver-stroke">
            <!-- Top Pins (Asymmetrisch) -->
            <path d="M250 120 V30 M230 130 V60 M270 130 V60 M210 145 V90 M290 145 V90" />
            <circle cx="250" cy="30" r="3" class="silver-fill" />
            <circle cx="230" cy="60" r="3" class="silver-fill" />
            <circle cx="270" cy="60" r="3" class="silver-fill" />
            
            <!-- Side Pins (Links/Rechts) -->
            <path d="M150 250 H40 M150 220 H65 M150 280 H65 M160 190 H90 M160 310 H90" />
            <path d="M350 250 H460 M350 220 H435 M350 280 H435 M340 190 H410 M340 310 H410" />
        </g>

        <!-- Der Chip-Körper -->
        <rect x="155" y="155" width="190" height="190" rx="28" fill="#4a5568" stroke="url(#brushedSilver)" stroke-width="6" />
        <rect x="175" y="175" width="150" height="150" rx="18" class="silver-fill" />
        
        <!-- Schriftzug C.A.T.S -->
        <text x="250" y="262" text-anchor="middle" font-weight="900" font-size="42" fill="#2d3436">C.A.T.S</text>

        <!-- Bodenspiegelung (Reflexion) -->
        <g transform="translate(0, 560) scale(1, -0.5)">
            <rect x="155" y="0" width="190" height="150" rx="28" fill="url(#reflectionFade)" />
            <path d="M250 0 V100" stroke="url(#reflectionFade)" stroke-width="2" fill="none" />
        </g>
    </svg>

    <p class="philosophy">&bdquo;Ein harmloser Mann ist nicht friedlich, er ist harmlos.&ldquo;</p>
</div>
</body>
</html>
